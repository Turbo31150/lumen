name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci 2>/dev/null || npm install 2>/dev/null || echo 'No package.json found'

    - name: Lint
      run: npm run lint 2>/dev/null || echo 'No lint script'

    - name: Build
      run: npm run build 2>/dev/null || echo 'No build script'

  docker-build:
    runs-on: ubuntu-latest
    needs: test-frontend
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Check Dockerfile exists
      id: check_dockerfile
      run: |
        if [ -f Dockerfile ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "No Dockerfile found, skipping build"
        fi

    - name: Set up Docker Buildx
      if: steps.check_dockerfile.outputs.exists == 'true'
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image
      if: steps.check_dockerfile.outputs.exists == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: lumen:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
